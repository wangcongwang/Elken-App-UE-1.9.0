<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>My Subscriptions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f5f7fa;
            color: #111827;
            min-width: 100%;
            overflow-x: hidden;
            padding-bottom: 40px;
        }

        .status-bar {
            background-color: white;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
        }

        .header {
            background-color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 99;
        }

        .back-arrow {
            font-size: 24px;
            cursor: pointer;
            color: #333;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            flex: 1;
            text-align: center;
        }

        .header-placeholder {
            width: 24px;
        }

        /* Tab bar */
        .tab-bar {
            display: flex;
            background-color: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 16px;
        }

        .tab-item {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-size: 14px;
            font-weight: 500;
            color: #9ca3af;
            cursor: pointer;
            position: relative;
            transition: color 0.2s;
        }

        .tab-item.active {
            color: #1e3a8a;
            font-weight: 600;
        }

        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 20%;
            right: 20%;
            height: 3px;
            background-color: #1e3a8a;
            border-radius: 3px 3px 0 0;
        }

        /* Subscription cards */
        .sub-list {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sub-card {
            background-color: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }

        .sub-card-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f3f4f6;
        }

        .sub-card-id {
            font-size: 13px;
            color: #9ca3af;
        }

        .sub-status {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .sub-status.active {
            background-color: #ecfdf5;
            color: #059669;
        }

        .sub-status.paused {
            background-color: #fef3c7;
            color: #d97706;
        }

        .sub-status.cancelled {
            background-color: #f3f4f6;
            color: #6b7280;
        }

        .sub-card-body {
            padding: 14px 16px;
            display: flex;
            gap: 14px;
        }

        .sub-image {
            width: 72px;
            height: 72px;
            border-radius: 12px;
            overflow: hidden;
            flex-shrink: 0;
            background: #f3f4f6;
        }

        .sub-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .sub-info {
            flex: 1;
            min-width: 0;
        }

        .sub-name {
            font-size: 15px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sub-plan {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 6px;
        }

        .sub-price-row {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }

        .sub-price {
            font-size: 18px;
            font-weight: 700;
            color: #1e3a8a;
        }

        .sub-price-period {
            font-size: 13px;
            color: #9ca3af;
        }

        .sub-card-footer {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #f3f4f6;
        }

        .sub-date {
            font-size: 12px;
            color: #9ca3af;
        }

        .sub-next {
            font-size: 12px;
            color: #6b7280;
        }

        .sub-actions {
            display: flex;
            gap: 8px;
        }

        .sub-action-btn {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .sub-action-btn.primary {
            background-color: #1e3a8a;
            color: white;
        }

        .sub-action-btn.secondary {
            background-color: #f3f4f6;
            color: #374151;
        }

        .sub-action-btn:active {
            transform: scale(0.96);
        }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 32px;
            text-align: center;
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-title {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 14px;
            color: #9ca3af;
            margin-bottom: 24px;
        }

        .empty-btn {
            padding: 12px 32px;
            background: linear-gradient(135deg, #1e3a8a, #1e40af);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        .empty-btn:active {
            transform: scale(0.96);
        }

        /* Detail modal */
        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            z-index: 2000;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }

        .detail-overlay.active {
            display: flex;
        }

        .detail-modal {
            background-color: white;
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            animation: slide-up 0.3s ease-out;
        }

        @keyframes slide-up {
            0% { transform: translateY(100%); }
            100% { transform: translateY(0); }
        }

        .detail-header {
            padding: 20px 16px 12px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .detail-title {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
        }

        .detail-close {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background-color: #f3f4f6;
            border: none;
            font-size: 18px;
            color: #6b7280;
            cursor: pointer;
        }

        .detail-body {
            padding: 16px;
        }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-section-title {
            font-size: 14px;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f3f4f6;
        }

        .detail-label {
            font-size: 14px;
            color: #6b7280;
        }

        .detail-value {
            font-size: 14px;
            font-weight: 500;
            color: #1f2937;
        }

        .detail-btn-row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }

        .detail-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-align: center;
        }

        .detail-btn.cancel {
            background-color: #fef2f2;
            color: #dc2626;
        }

        .detail-btn.close-btn {
            background: linear-gradient(135deg, #1e3a8a, #1e40af);
            color: white;
        }

        /* Billing history */
        .history-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f3f4f6;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .history-icon.success {
            background-color: #ecfdf5;
        }

        .history-icon.failed {
            background-color: #fef2f2;
        }

        .history-info {
            flex: 1;
            min-width: 0;
        }

        .history-title {
            font-size: 14px;
            font-weight: 500;
            color: #1f2937;
        }

        .history-date {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 2px;
        }

        .history-amount {
            font-size: 14px;
            font-weight: 600;
            color: #1f2937;
            text-align: right;
        }

        .history-status {
            font-size: 11px;
            text-align: right;
            margin-top: 2px;
        }

        .history-status.success {
            color: #059669;
        }

        .history-status.failed {
            color: #dc2626;
        }

        .history-gift {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }

        .history-gift-tag {
            font-size: 11px;
            color: #6b7280;
            background-color: #f5f7fa;
            padding: 2px 8px;
            border-radius: 6px;
            white-space: nowrap;
        }

        .history-gift-tag:has(+ .history-gift-tag) {
            /* spacing handled by gap */
        }

        .history-bv-tag {
            font-size: 11px;
            color: #065f46;
            background: linear-gradient(135deg, #ecfdf5, #d1fae5);
            padding: 2px 8px;
            border-radius: 6px;
            white-space: nowrap;
            font-weight: 600;
        }

        .bv-summary {
            display: flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #ecfdf5, #d1fae5);
            padding: 10px 14px;
            border-radius: 12px;
            margin-top: 10px;
        }

        .bv-summary-icon {
            font-size: 20px;
        }

        .bv-summary-text {
            font-size: 14px;
            font-weight: 600;
            color: #065f46;
        }

        .bv-summary-sub {
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span>9:41</span>
        <div style="display: flex; gap: 4px; align-items: center;">
            <span>📶</span>
            <span>📶</span>
            <span>🔋</span>
        </div>
    </div>

    <div class="header">
        <div class="back-arrow" onclick="window.location.href='mall.html'">←</div>
        <div class="header-title">My Subscriptions</div>
        <div class="header-placeholder"></div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" onclick="filterSubs('active', this)">Active</div>
        <div class="tab-item" onclick="filterSubs('paused', this)">Paused</div>
        <div class="tab-item" onclick="filterSubs('all', this)">All</div>
    </div>

    <div class="sub-list" id="subList">
        <!-- Dynamically populated -->
    </div>

    <!-- Detail modal -->
    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-modal">
            <div class="detail-header">
                <div class="detail-title">Subscription Details</div>
                <button class="detail-close" onclick="closeDetail()">×</button>
            </div>
            <div class="detail-body" id="detailBody">
                <!-- Dynamically populated -->
            </div>
        </div>
    </div>

    <script>
        // Demo data + localStorage subscriptions
        function getSubscriptions() {
            let stored = JSON.parse(localStorage.getItem('subscriptions') || '[]');
            // Use demo data if empty or if stored data lacks billingHistory
            const hasHistory = stored.length > 0 && stored.every(s => s.billingHistory && s.billingHistory.length > 1);
            if (!hasHistory) {
                return [
                    {
                        id: 'SUB-20260601-001',
                        name: 'Kenwood Water Purifier KWP-2280',
                        image: 'https://images.unsplash.com/photo-1574269909862-7e1d70bb8078?auto=format&fit=crop&w=200&q=80',
                        plan: 'Annual',
                        planKey: 'annual',
                        price: 98,
                        firstMonth: 68,
                        bv: 0.50,
                        status: 'active',
                        startDate: '2026-06-01',
                        nextBilling: '2026-07-01',
                        installDate: '2026-06-08',
                        paymentMethod: 'Visa •••• 4242',
                        billingHistory: [
                            { date: '2026-06-01', amount: 68, status: 'success', desc: 'First month (promo)', gift: ['Alkaline Filter Set', 'Cleaning Kit', 'User Guide'], bv: 0.50 },
                            { date: '2026-07-01', amount: 98, status: 'success', desc: 'Monthly subscription', gift: ['Spare Nozzle', 'Descaling Solution'], bv: 0.50 },
                            { date: '2026-08-01', amount: 98, status: 'success', desc: 'Monthly subscription + 1000 PRP Points', gift: ['1000 PRP Points', 'Premium Filter', 'Cleaning Cloth'], bv: 0.50 },
                            { date: '2026-09-01', amount: 98, status: 'success', desc: 'Monthly subscription', gift: ['Replacement Filter', 'Sanitiser Drops'], bv: 0.50 },
                            { date: '2026-10-01', amount: 98, status: 'failed', desc: 'Monthly subscription — Card declined', gift: [], bv: 0 },
                            { date: '2026-10-05', amount: 98, status: 'success', desc: 'Monthly subscription — Retry', gift: ['Replacement Filter', 'Sanitiser Drops'], bv: 0.50 },
                            { date: '2026-11-01', amount: 98, status: 'success', desc: 'Monthly subscription', gift: ['Replacement Filter', 'Sanitiser Drops'], bv: 0.50 },
                            { date: '2026-12-01', amount: 98, status: 'success', desc: 'Monthly subscription', gift: ['Replacement Filter', 'Sanitiser Drops'], bv: 0.50 }
                        ]
                    },
                    {
                        id: 'SUB-20260515-002',
                        name: 'Elken BioPure Water System',
                        image: 'https://images.unsplash.com/photo-1556228578-0d85b1a4d571?auto=format&fit=crop&w=200&q=80',
                        plan: 'Monthly',
                        planKey: 'monthly',
                        price: 128,
                        firstMonth: null,
                        bv: 0.64,
                        status: 'active',
                        startDate: '2026-05-15',
                        nextBilling: '2026-06-15',
                        installDate: '2026-05-20',
                        paymentMethod: 'GrabPay',
                        billingHistory: [
                            { date: '2026-05-15', amount: 128, status: 'success', desc: 'Monthly subscription', gift: ['Replacement Filter', 'Sanitiser Drops'], bv: 0.64 },
                            { date: '2026-04-15', amount: 128, status: 'success', desc: 'Monthly subscription', gift: ['Replacement Filter', 'Sanitiser Drops'], bv: 0.64 },
                            { date: '2026-03-15', amount: 128, status: 'success', desc: 'Monthly subscription + 1000 PRP Points', gift: ['1000 PRP Points', 'Premium Filter', 'Cleaning Cloth'], bv: 0.64 },
                            { date: '2026-02-15', amount: 128, status: 'success', desc: 'Monthly subscription', gift: ['Spare Nozzle', 'Descaling Solution'], bv: 0.64 },
                            { date: '2026-01-15', amount: 128, status: 'success', desc: 'Monthly subscription', gift: ['Alkaline Filter Set', 'Cleaning Kit', 'User Guide'], bv: 0.64 },
                            { date: '2025-12-15', amount: 128, status: 'success', desc: 'Monthly subscription', gift: ['Replacement Filter', 'Sanitiser Drops'], bv: 0.64 },
                            { date: '2025-11-15', amount: 128, status: 'success', desc: 'Monthly subscription', gift: ['Replacement Filter', 'Sanitiser Drops'], bv: 0.64 },
                            { date: '2025-10-15', amount: 128, status: 'failed', desc: 'Monthly subscription — Payment timeout', gift: [], bv: 0 },
                            { date: '2025-10-18', amount: 128, status: 'success', desc: 'Monthly subscription — Retry', gift: ['Replacement Filter', 'Sanitiser Drops'], bv: 0.64 },
                            { date: '2025-09-15', amount: 128, status: 'success', desc: 'Monthly subscription', gift: ['Replacement Filter', 'Sanitiser Drops'], bv: 0.64 },
                            { date: '2025-08-15', amount: 128, status: 'success', desc: 'Monthly subscription', gift: ['Alkaline Filter Set', 'Cleaning Kit', 'User Guide'], bv: 0.64 }
                        ]
                    }
                ];
            }
            // Ensure billingHistory exists on stored items
            stored = stored.map(s => {
                if (!s.billingHistory) {
                    s.billingHistory = [
                        { date: s.startDate, amount: s.firstMonth || s.price, status: 'success', desc: s.firstMonth ? 'First month (promo)' : 'Monthly subscription' }
                    ];
                }
                return s;
            });
            return stored;
        }

        let currentFilter = 'active';
        let allSubs = getSubscriptions();

        function renderSubs() {
            const list = document.getElementById('subList');
            const filtered = currentFilter === 'all'
                ? allSubs
                : allSubs.filter(s => s.status === currentFilter);

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📦</div>
                        <div class="empty-title">No Subscriptions</div>
                        <div class="empty-desc">You don't have any ${currentFilter === 'all' ? '' : currentFilter + ' '}subscriptions yet.</div>
                        <button class="empty-btn" onclick="window.location.href='mall.html'">Browse Products</button>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map((sub, idx) => `
                <div class="sub-card" onclick="showDetail(${allSubs.indexOf(sub)})">
                    <div class="sub-card-header">
                        <span class="sub-card-id">${sub.id}</span>
                        <span class="sub-status ${sub.status}">${sub.status.charAt(0).toUpperCase() + sub.status.slice(1)}</span>
                    </div>
                    <div class="sub-card-body">
                        <div class="sub-image">
                            <img src="${sub.image}" alt="${sub.name}">
                        </div>
                        <div class="sub-info">
                            <div class="sub-name">${sub.name}</div>
                            <div class="sub-plan">${sub.plan} Plan${sub.planKey === 'annual' ? ' · 12 Months' : ''}</div>
                            <div class="sub-price-row">
                                <span class="sub-price">MYR ${sub.price}</span>
                                <span class="sub-price-period">/mo</span>
                            </div>
                        </div>
                    </div>
                    <div class="sub-card-footer">
                        <span class="sub-date">Started ${formatDate(sub.startDate)}</span>
                        <span class="sub-next">Next billing: ${formatDate(sub.nextBilling)}</span>
                    </div>
                </div>
            `).join('');
        }

        function filterSubs(filter, el) {
            currentFilter = filter;
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderSubs();
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-MY', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function showDetail(idx) {
            const sub = allSubs[idx];
            const body = document.getElementById('detailBody');
            body.innerHTML = `
                <div class="detail-section">
                    <div class="detail-section-title">Product</div>
                    <div class="detail-row">
                        <span class="detail-label">Name</span>
                        <span class="detail-value">${sub.name}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Subscription ID</span>
                        <span class="detail-value">${sub.id}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Status</span>
                        <span class="detail-value" style="color: ${sub.status === 'active' ? '#059669' : sub.status === 'paused' ? '#d97706' : '#6b7280'}">${sub.status.charAt(0).toUpperCase() + sub.status.slice(1)}</span>
                    </div>
                </div>
                <div class="detail-section">
                    <div class="detail-section-title">Plan</div>
                    <div class="detail-row">
                        <span class="detail-label">Plan</span>
                        <span class="detail-value">${sub.plan}${sub.planKey === 'annual' ? ' (12 Months)' : ''}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Monthly Fee</span>
                        <span class="detail-value">MYR ${sub.price}/mo</span>
                    </div>
                    ${sub.firstMonth ? `<div class="detail-row"><span class="detail-label">First Month</span><span class="detail-value">MYR ${sub.firstMonth}</span></div>` : ''}
                    <div class="detail-row">
                        <span class="detail-label">Monthly BV</span>
                        <span class="detail-value" style="color: #065f46; font-weight: 700;">BV ${sub.bv || 0}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Payment Method</span>
                        <span class="detail-value">${sub.paymentMethod}</span>
                    </div>
                </div>
                <div class="detail-section">
                    <div class="detail-section-title">Schedule</div>
                    <div class="detail-row">
                        <span class="detail-label">Start Date</span>
                        <span class="detail-value">${formatDate(sub.startDate)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Next Billing</span>
                        <span class="detail-value">${formatDate(sub.nextBilling)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Installation</span>
                        <span class="detail-value">${formatDate(sub.installDate)}</span>
                    </div>
                </div>
                <div class="detail-section">
                    <div class="detail-section-title">Billing History</div>
                    ${(sub.billingHistory || []).map(h => `
                        <div class="history-item">
                            <div class="history-icon ${h.status}">${h.status === 'success' ? '✓' : '✕'}</div>
                            <div class="history-info">
                                <div class="history-title">${h.desc}</div>
                                <div class="history-date">${formatDate(h.date)}</div>
                                ${h.gift && h.gift.length > 0 ? '<div class="history-gift">' + h.gift.map(g => '<span class="history-gift-tag">' + (g.includes('PRP') ? '⭐ ' : '🎁 ') + g + '</span>').join('') + '</div>' : ''}
                                ${h.bv ? '<div class="history-gift" style="margin-top: 2px;"><span class="history-bv-tag">📈 BV ' + h.bv.toFixed(2) + '</span></div>' : ''}
                            </div>
                            <div>
                                <div class="history-amount">MYR ${h.amount}</div>
                                <div class="history-status ${h.status}">${h.status === 'success' ? 'Paid' : 'Failed'}</div>
                            </div>
                        </div>
                    `).join('')}
                    ${(() => {
                        const totalBV = (sub.billingHistory || []).reduce((sum, h) => sum + (h.bv || 0), 0);
                        return '<div class="bv-summary"><span class="bv-summary-icon">📈</span><div><div class="bv-summary-text">Total BV Earned: ' + totalBV.toFixed(2) + '</div><div class="bv-summary-sub">BV is credited on each successful payment</div></div></div>';
                    })()}
                </div>
                <div class="detail-btn-row">
                    ${sub.status === 'active' ? '<button class="detail-btn cancel" onclick="cancelSub(' + idx + ')">Cancel Subscription</button>' : ''}
                    <button class="detail-btn close-btn" onclick="closeDetail()">Close</button>
                </div>
            `;
            document.getElementById('detailOverlay').classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('active');
        }

        function cancelSub(idx) {
            if (confirm('Are you sure you want to cancel this subscription?')) {
                allSubs[idx].status = 'cancelled';
                localStorage.setItem('subscriptions', JSON.stringify(allSubs));
                closeDetail();
                renderSubs();
            }
        }

        // Close overlay on background click
        document.getElementById('detailOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeDetail();
        });

        // Init
        renderSubs();
    </script>
</body>
</html>
