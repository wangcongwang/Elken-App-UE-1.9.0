<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elken app重构版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .header {
            padding: 20px;
            text-align: center;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .cards-container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .card {
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .card-image {
            height: 120px;
            overflow: hidden;
        }
        
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .card-title {
            padding: 15px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            color: #999;
        }
        
        .nav-item.active {
            color: #007aff;
        }
        
        .nav-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">事业中心</div>
    </div>
    
    <div class="cards-container">
        <div class="card">
            <div class="card-image">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=lightbulb%20ideas%20coming%20out%20of%20a%20box%20on%20open%20book&image_size=square" alt="资料库">
            </div>
            <div class="card-title">资料库</div>
        </div>
        <div class="card" onclick="window.location.href='ecam_business_tools.html'">
            <div class="card-image">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=person%20climbing%20stairs%20towards%20success&image_size=square" alt="爱康事业工具">
            </div>
            <div class="card-title">爱康事业工具</div>
        </div>
        <div class="card">
            <div class="card-image">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=GenQi%20logo%20on%20blue%20background&image_size=square" alt="GenQi店铺管理">
            </div>
            <div class="card-title">GenQi店铺管理</div>
        </div>
        <div class="card">
            <div class="card-image">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=woman%20using%20laptop%20at%20desk&image_size=square" alt="注册">
            </div>
            <div class="card-title">注册</div>
        </div>
        <div class="card">
            <div class="card-image">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=gold%20coin%20with%20eToken%20symbol&image_size=square" alt="eToken">
            </div>
            <div class="card-title">eToken</div>
        </div>
        <div class="card" onclick="window.location.href='e_wallet.html'">
            <div class="card-image">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=digital%20wallet%20with%20coins%20and%20currency%20symbols&image_size=square" alt="e-Wallet">
            </div>
            <div class="card-title">e-Wallet</div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <div class="nav-item">
            <div class="nav-icon">🛒</div>
            <div>商城</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">📰</div>
            <div>资讯中心</div>
        </div>
        <div class="nav-item active">
            <div class="nav-icon">💼</div>
            <div>事业中心</div>
        </div>
        <div class="nav-item" onclick="window.location.href='profile_page1.html'">
            <div class="nav-icon">👤</div>
            <div>个人中心</div>
        </div>
    </div>
</body>
</html>
