<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elken app重构版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .header {
            background-color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .back-arrow {
            font-size: 20px;
            margin-right: 15px;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .settings-container {
            background-color: white;
            margin: 10px 0;
            padding: 0 20px;
        }
        
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .setting-item:last-child {
            border-bottom: none;
        }
        
        .setting-label {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #333;
        }
        
        .setting-icon {
            margin-right: 10px;
            font-size: 16px;
        }
        
        .setting-value {
            font-size: 14px;
            color: #999;
            display: flex;
            align-items: center;
        }
        
        .arrow-icon {
            margin-left: 10px;
            font-size: 12px;
            color: #999;
        }
        
        .danger-section {
            margin-top: 30px;
        }
        
        .danger-item {
            color: #ff3b30;
        }
        
        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background-color: white;
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }
        
        .modal-header {
            text-align: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .modal-title {
            font-size: 16px;
            font-weight: 600;
        }
        
        .modal-body {
            padding: 20px 0;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .form-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .modal-footer {
            display: flex;
            gap: 10px;
            border-top: 1px solid #f0f0f0;
            padding-top: 15px;
        }
        
        .modal-button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        
        .cancel-button {
            background-color: #f5f5f5;
            color: #333;
        }
        
        .confirm-button {
            background-color: #007aff;
            color: white;
        }
        
        .error-message {
            color: #ff3b30;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .eye-icon {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 16px;
            color: #999;
        }
        
        /* 非模态提示框样式 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="back-arrow" onclick="window.location.href='profile_page2.html'">←</div>
        <div class="header-title">设置</div>
    </div>
    
    <div class="settings-container">
        <div class="setting-item">
            <div class="setting-label">
                <span class="setting-icon">🌐</span>
                语言
            </div>
            <div class="setting-value">
                简体中文
                <span class="arrow-icon">›</span>
            </div>
        </div>
        
        <div class="setting-item">
            <div class="setting-label">
                <span class="setting-icon">📍</span>
                位置权限
            </div>
            <div class="setting-value">
                去设置
                <span class="arrow-icon">›</span>
            </div>
        </div>
        
        <div class="setting-item" onclick="openPasswordModal()">
            <div class="setting-label">
                <span class="setting-icon">🔒</span>
                修改密码
            </div>
            <div class="setting-value">
                <span class="arrow-icon">›</span>
            </div>
        </div>
        
        <div class="setting-item">
            <div class="setting-label">
                <span class="setting-icon">📱</span>
                版本
            </div>
            <div class="setting-value">
                V 1.6.0
            </div>
        </div>
    </div>
    
    <div class="settings-container danger-section">
        <div class="setting-item">
            <div class="setting-label danger-item">
                <span class="setting-icon">📄</span>
                用户协议
            </div>
            <div class="setting-value">
                <span class="arrow-icon">›</span>
            </div>
        </div>
        
        <div class="setting-item">
            <div class="setting-label danger-item">
                <span class="setting-icon">🔒</span>
                隐私协议
            </div>
            <div class="setting-value">
                <span class="arrow-icon">›</span>
            </div>
        </div>
        
        <div class="setting-item">
            <div class="setting-label danger-item">
                <span class="setting-icon">🚪</span>
                退出登录
            </div>
            <div class="setting-value">
                <span class="arrow-icon">›</span>
            </div>
        </div>
        
        <div class="setting-item">
            <div class="setting-label danger-item">
                <span class="setting-icon">🗑️</span>
                注销账号
            </div>
            <div class="setting-value">
                <span class="arrow-icon">›</span>
            </div>
        </div>
    </div>
    
    <!-- 修改密码弹窗 -->
    <div class="modal" id="passwordModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">修改密码</div>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">旧密码</label>
                    <div style="position: relative;">
                        <input type="password" class="form-input" id="oldPassword" placeholder="请输入旧密码">
                        <span class="eye-icon" onclick="togglePassword('oldPassword', this)">👁️</span>
                    </div>
                    <div class="error-message" id="oldPasswordError"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">新密码</label>
                    <div style="position: relative;">
                        <input type="password" class="form-input" id="newPassword" placeholder="请输入新密码">
                        <span class="eye-icon" onclick="togglePassword('newPassword', this)">👁️</span>
                    </div>
                    <div class="error-message" id="newPasswordError"></div>
                </div>
                <div class="form-group">
                    <label class="form-label">确认新密码</label>
                    <div style="position: relative;">
                        <input type="password" class="form-input" id="confirmPassword" placeholder="请再次输入新密码">
                        <span class="eye-icon" onclick="togglePassword('confirmPassword', this)">👁️</span>
                    </div>
                    <div class="error-message" id="confirmPasswordError"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-button cancel-button" onclick="closePasswordModal()">取消</button>
                <button class="modal-button confirm-button" onclick="changePassword()">确定</button>
            </div>
        </div>
    </div>
    
    <!-- 非模态提示框 -->
    <div class="toast" id="toast"></div>
    
    <script>
        // 打开修改密码弹窗
        function openPasswordModal() {
            document.getElementById('passwordModal').style.display = 'flex';
        }
        
        // 关闭修改密码弹窗
        function closePasswordModal() {
            document.getElementById('passwordModal').style.display = 'none';
            // 清空表单和错误信息
            document.getElementById('oldPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
            document.getElementById('oldPasswordError').style.display = 'none';
            document.getElementById('newPasswordError').style.display = 'none';
            document.getElementById('confirmPasswordError').style.display = 'none';
            // 重置密码输入框类型
            document.getElementById('oldPassword').type = 'password';
            document.getElementById('newPassword').type = 'password';
            document.getElementById('confirmPassword').type = 'password';
            // 重置眼睛图标
            document.querySelectorAll('.eye-icon').forEach(icon => {
                icon.textContent = '👁️';
            });
        }
        
        // 显示非模态提示框
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        // 切换密码显示/隐藏
        function togglePassword(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '👁️‍🗨️';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }
        
        // 修改密码
        function changePassword() {
            // 获取输入值
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // 清空错误信息
            document.getElementById('oldPasswordError').style.display = 'none';
            document.getElementById('newPasswordError').style.display = 'none';
            document.getElementById('confirmPasswordError').style.display = 'none';
            
            // 验证旧密码
            if (oldPassword !== '123456') {
                document.getElementById('oldPasswordError').textContent = '旧密码错误';
                document.getElementById('oldPasswordError').style.display = 'block';
                return;
            }
            
            // 验证新密码格式
            const passwordRegex = /^[a-zA-Z0-9]{6,}$/;
            if (!passwordRegex.test(newPassword)) {
                document.getElementById('newPasswordError').textContent = '密码只能由字母和数字组成，且至少6位';
                document.getElementById('newPasswordError').style.display = 'block';
                return;
            }
            
            // 验证新密码和确认密码是否一致
            if (newPassword !== confirmPassword) {
                document.getElementById('confirmPasswordError').textContent = '两次输入的密码不一致';
                document.getElementById('confirmPasswordError').style.display = 'block';
                return;
            }
            
            // 密码修改成功
            showToast('密码修改成功');
            closePasswordModal();
        }
    </script>
</body>
</html>
