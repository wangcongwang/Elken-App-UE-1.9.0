<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elken app重构版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .header {
            padding: 20px;
            text-align: center;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .cards-container {
            padding: 20px;
            display: flex;
            gap: 15px;
        }
        
        .card {
            flex: 1;
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .card-image {
            height: 120px;
            overflow: hidden;
        }
        
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .card-title {
            padding: 15px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            color: #999;
        }
        
        .nav-item.active {
            color: #007aff;
        }
        
        .nav-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">Profile</div>
    </div>
    
    <div class="cards-container">
        <div class="card" onclick="window.location.href='profile_page2.html'">
            <div class="card-image">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=password%20security%20interface%20with%20dots&image_size=square" alt="资料">
            </div>
            <div class="card-title">资料</div>
        </div>
        <div class="card">
            <div class="card-image">
                <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=person%20using%20smartphone%20with%20message%20bubbles&image_size=square" alt="消息">
            </div>
            <div class="card-title">消息</div>
        </div>
    </div>
    
    <div class="bottom-nav">
        <div class="nav-item">
            <div class="nav-icon">🛒</div>
            <div>商城</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">📰</div>
            <div>资讯中心</div>
        </div>
        <div class="nav-item" onclick="window.location.href='business_center.html'">
            <div class="nav-icon">💼</div>
            <div>事业中心</div>
        </div>
        <div class="nav-item active">
            <div class="nav-icon">👤</div>
            <div>个人中心</div>
        </div>
    </div>
    
    <script>
        // 页面加载时从本地存储加载头像
        window.addEventListener('load', function() {
            const savedAvatar = localStorage.getItem('avatar');
            if (savedAvatar) {
                // 这里可以更新页面上的头像显示
                // 由于当前页面没有直接显示头像，此功能预留
            }
        });
    </script>
</body>
</html>
