<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elken app重构版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .header {
            background-color: #0066cc;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-left {
            display: flex;
            align-items: center;
        }
        
        .back-arrow {
            font-size: 20px;
            margin-right: 10px;
            cursor: pointer;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: calc(100vh - 60px);
        }
        
        .policy-image {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .policy-info {
            margin-top: 20px;
            text-align: center;
        }
        
        .policy-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .policy-description {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }
        
        .download-btn {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        
        .download-btn:hover {
            background-color: #0052a3;
        }
        
        .download-btn:active {
            background-color: #003d7a;
        }
        
        .download-icon {
            font-size: 20px;
        }
        
        .download-text {
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div class="back-arrow" onclick="window.history.back()">←</div>
            <div class="header-title">e-form详情</div>
        </div>
    </div>
    
    <div class="content">
        <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=business%20document%20policy%20agreement&image_size=landscape_16_9" alt="政策文件" class="policy-image">
        <div class="policy-info">
            <div class="policy-title">电子表格</div>
            <div class="policy-description">
                这是电子表格的详细内容页面。
                您可以在这里查看完整的电子表格信息。
            </div>
            <button class="download-btn" onclick="downloadFile()">
                <span class="download-icon">⬇</span>
                <span class="download-text">下载文件</span>
            </button>
        </div>
    </div>

    <script>
        function downloadFile() {
            const link = document.createElement('a');
            link.href = 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=business%20document%20policy%20agreement&image_size=landscape_16_9';
            link.download = 'business_document_policy_agreement.png';
            link.target = '_blank';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
