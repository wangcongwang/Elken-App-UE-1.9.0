<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Order for Downline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8f9fa;
            color: #111827;
            min-width: 100%;
            overflow-x: hidden;
        }

        /* 开门转场特效 */
        .portal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, #0a0a1a 0%, #1a1a3e 50%, #0f3460 100%);
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            overflow: hidden;
            perspective: 1000px;
        }

        .portal-overlay.active {
            display: flex;
        }

        /* 门容器 */
        .door-container {
            position: relative;
            width: 220px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 门框 */
        .door-frame {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 6px solid #c9a227;
            border-radius: 110px 110px 0 0;
            background: linear-gradient(180deg, #2a1810 0%, #1a0f08 100%);
            box-shadow: 
                0 0 40px rgba(201, 162, 39, 0.4),
                inset 0 0 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* 门内光芒 */
        .door-light {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 180px;
            height: 280px;
            background: radial-gradient(ellipse, rgba(255, 240, 200, 0.95) 0%, rgba(255, 220, 150, 0.7) 30%, rgba(255, 180, 80, 0.3) 60%, transparent 80%);
            opacity: 0;
            animation: light-appear 2s ease-out forwards;
        }

        @keyframes light-appear {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        /* 左门板 */
        .door-left {
            position: absolute;
            left: 0;
            top: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, #3d2817 0%, #5a3d26 50%, #3d2817 100%);
            border-right: 2px solid #c9a227;
            transform-origin: left center;
            animation: door-open-left 2s ease-in-out forwards;
            z-index: 10;
        }

        /* 右门板 */
        .door-right {
            position: absolute;
            right: 0;
            top: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, #3d2817 0%, #5a3d26 50%, #3d2817 100%);
            border-left: 2px solid #c9a227;
            transform-origin: right center;
            animation: door-open-right 2s ease-in-out forwards;
            z-index: 10;
        }

        /* 门把手 */
        .door-handle {
            position: absolute;
            width: 12px;
            height: 30px;
            background: linear-gradient(180deg, #c9a227 0%, #8b6914 100%);
            border-radius: 6px;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .door-handle.left {
            right: 15px;
        }

        .door-handle.right {
            left: 15px;
        }

        @keyframes door-open-left {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(-110deg); }
        }

        @keyframes door-open-right {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(110deg); }
        }

        /* 蝴蝶飞入 */
        .butterfly {
            position: absolute;
            font-size: 36px;
            z-index: 5;
            animation: butterfly-enter 2.5s ease-in-out forwards;
            filter: drop-shadow(0 0 8px rgba(255, 220, 150, 0.8));
        }

        @keyframes butterfly-enter {
            0% {
                transform: translateY(200px) scale(0.3) rotate(0deg);
                opacity: 0;
            }
            30% {
                opacity: 1;
                transform: translateY(100px) scale(0.8) rotate(-15deg);
            }
            60% {
                transform: translateY(0px) scale(1) rotate(10deg);
            }
            80% {
                transform: translateY(-50px) scale(0.8) rotate(-5deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(0.2) rotate(0deg);
                opacity: 0;
            }
        }

        /* 粒子飘散 */
        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #fff 0%, #ffd700 50%, transparent 100%);
            border-radius: 50%;
            animation: sparkle-float 2s ease-out forwards;
        }

        @keyframes sparkle-float {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .portal-text {
            color: white;
            font-size: 16px;
            font-weight: 500;
            margin-top: 40px;
            text-align: center;
            animation: text-fade 1.5s ease-in-out infinite alternate;
            text-shadow: 0 0 15px rgba(255, 220, 150, 0.6);
        }

        @keyframes text-fade {
            0% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .status-bar {
            background-color: white;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
        }

        .header {
            background-color: white;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-arrow {
            font-size: 24px;
            cursor: pointer;
            color: #333;
            flex-shrink: 0;
        }

        .search-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            padding: 10px 48px 10px 16px;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            font-size: 14px;
            background-color: #f3f4f6;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #059669;
            background-color: white;
        }

        .clear-btn {
            position: absolute;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            font-size: 14px;
            cursor: pointer;
            padding: 4px;
            display: none;
        }

        .clear-btn.visible {
            display: block;
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #059669;
            font-size: 20px;
            cursor: pointer;
        }

        .main-content {
            padding: 32px 16px;
            min-height: calc(100vh - 140px);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding-top: 60px;
        }

        .empty-icon {
            width: 120px;
            height: 120px;
            margin-bottom: 24px;
            position: relative;
        }

        .empty-icon svg {
            width: 100%;
            height: 100%;
        }

        .empty-title {
            font-size: 24px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 12px;
        }

        .empty-description {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.6;
            max-width: 280px;
        }

        .search-results {
            display: none;
        }

        .search-results.active {
            display: block;
        }

        .result-item {
            padding: 16px;
            border-bottom: 1px solid #e5e7eb;
            cursor: pointer;
            transition: background-color 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .result-item:hover {
            background-color: #f9fafb;
        }

        .result-item.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .result-item.disabled:hover {
            background-color: transparent;
        }

        .result-info {
            flex: 1;
        }

        .result-name {
            font-size: 16px;
            font-weight: 500;
            color: #1f2937;
        }

        .result-id {
            font-size: 13px;
            color: #6b7280;
            margin-top: 2px;
        }

        .result-item.expired .result-name {
            color: #9ca3af;
        }

        .result-item.expired .result-id {
            color: #9ca3af;
        }

        .result-status {
            font-size: 12px;
            font-weight: 600;
            color: #ef4444;
            padding: 4px 10px;
            background-color: #fef2f2;
            border-radius: 12px;
            white-space: nowrap;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
            color: #9ca3af;
            cursor: pointer;
        }

        .nav-item.active {
            color: #007aff;
        }

        .nav-icon {
            font-size: 24px;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>
    <div class="status-bar">
        <span>9:41</span>
        <div style="display: flex; gap: 4px; align-items: center;">
            <span>📶</span>
            <span>📶</span>
            <span>🔋</span>
        </div>
    </div>

    <div class="header">
        <div class="back-arrow" onclick="window.location.href='mall.html'">←</div>
        <div class="search-container">
            <input type="text" class="search-input" id="searchInput" placeholder="Member ID or Name" oninput="handleSearchInput()">
            <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
            <button class="search-btn" onclick="performSearch()">🔍</button>
        </div>
    </div>

    <div class="main-content">
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">
                <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="35" y="40" width="50" height="55" rx="8" stroke="#374151" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="60" cy="60" r="12" stroke="#374151" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M45 75H75" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
                    <path d="M45 85H65" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
                    <path d="M60 68V82" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="85" cy="75" r="15" stroke="#374151" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M80 72L85 77L92 70" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="30" cy="85" r="3" fill="#059669"/>
                    <circle cx="90" cy="35" r="2" fill="#374151"/>
                    <circle cx="100" cy="45" r="2.5" fill="#ec4899"/>
                    <path d="M75 45L80 40L83 46" stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="empty-title">Find Your Downline</div>
            <div class="empty-description">Enter a member ID or name in the search bar above to select your downline.</div>
        </div>

        <div class="search-results" id="searchResults"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="window.location.href='mall.html'">
            <div class="nav-icon">🛒</div>
            <div>商城</div>
        </div>
        <div class="nav-item">
            <div class="nav-icon">📰</div>
            <div>资讯中心</div>
        </div>
        <div class="nav-item" onclick="window.location.href='business_center.html'">
            <div class="nav-icon">💼</div>
            <div>事业中心</div>
        </div>
        <div class="nav-item" onclick="window.location.href='profile_page1.html'">
            <div class="nav-icon">👤</div>
            <div>个人中心</div>
        </div>
    </div>

    <!-- 开门转场特效 -->
    <div class="portal-overlay" id="portalOverlay">
        <div class="door-container">
            <div class="door-frame">
                <div class="door-light"></div>
            </div>
            <div class="door-left">
                <div class="door-handle left"></div>
            </div>
            <div class="door-right">
                <div class="door-handle right"></div>
            </div>
            <div class="butterfly">🦋</div>
        </div>
        <div class="portal-text">正在进入下单页面...</div>
    </div>

    <script>
        // 模拟会员数据
        const members = [
            { id: '100001234', name: 'Jonathan Doe De First / Liew Second Name', expired: false },
            { id: '100005678', name: 'Jonathan Dees Nuz', expired: false },
            { id: '100009999', name: 'Jonathan Denver', expired: true },
            { id: '100002222', name: 'Sarah Johnson', expired: false },
            { id: '100003333', name: 'Michael Chen', expired: true },
            { id: '100004444', name: 'Emily Wang', expired: false },
            { id: '100005555', name: 'David Lee', expired: false },
            { id: '100006666', name: 'Jessica Tan', expired: true }
        ];

        function handleSearchInput() {
            const input = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearBtn');
            const emptyState = document.getElementById('emptyState');
            const searchResults = document.getElementById('searchResults');

            if (input.value.trim()) {
                clearBtn.classList.add('visible');
                performSearch();
            } else {
                clearBtn.classList.remove('visible');
                searchResults.classList.remove('active');
                emptyState.style.display = 'flex';
            }
        }

        function clearSearch() {
            const input = document.getElementById('searchInput');
            input.value = '';
            handleSearchInput();
            input.focus();
        }

        function performSearch() {
            const input = document.getElementById('searchInput');
            const query = input.value.trim().toLowerCase();
            const emptyState = document.getElementById('emptyState');
            const searchResults = document.getElementById('searchResults');

            if (!query) {
                searchResults.classList.remove('active');
                emptyState.style.display = 'flex';
                return;
            }

            // 模糊搜索：匹配 member ID 或 member name
            const results = members.filter(member => 
                member.id.toLowerCase().includes(query) || 
                member.name.toLowerCase().includes(query)
            );

            renderResults(results);
            searchResults.classList.add('active');
            emptyState.style.display = 'none';
        }

        function renderResults(results) {
            const container = document.getElementById('searchResults');
            
            if (results.length === 0) {
                container.innerHTML = '<div class="empty-state" style="padding-top: 40px;"><div class="empty-description">No members found</div></div>';
                return;
            }

            container.innerHTML = results.map(member => {
                const expiredClass = member.expired ? 'expired disabled' : '';
                const statusBadge = member.expired ? '<span class="result-status">Expired</span>' : '';
                const clickHandler = member.expired ? '' : `onclick="selectDownline('${member.name}', '${member.id}')"`;
                
                return `
                    <div class="result-item ${expiredClass}" ${clickHandler}>
                        <div class="result-info">
                            <div class="result-name">${member.name}</div>
                            <div class="result-id">${member.id}</div>
                        </div>
                        ${statusBadge}
                    </div>
                `;
            }).join('');
        }

        function selectDownline(name, id) {
            // 显示穿梭门动画
            const portal = document.getElementById('portalOverlay');
            portal.classList.add('active');
            
            // 2秒后跳转，附带会员信息参数
            setTimeout(function() {
                const encodedName = encodeURIComponent(name);
                const encodedId = encodeURIComponent(id);
                window.location.href = `order_for_member.html?name=${encodedName}&id=${encodedId}`;
            }, 2000);
        }

        document.getElementById('searchInput').addEventListener('keyup', function(event) {
            if (event.key === 'Enter') {
                performSearch();
            }
        });
    </script>
</body>
</html>
