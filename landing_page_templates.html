<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择 Landing Page 模板</title>
    <style>
        :root {
            --green-50: #f0fdf4; --green-100: #dcfce7; --green-200: #bbf7d0;
            --green-500: #22c55e; --green-600: #16a34a; --green-700: #15803d;
            --slate-50: #f8fafc; --slate-100: #f1f5f9; --slate-200: #e2e8f0;
            --slate-500: #64748b; --slate-600: #475569; --slate-800: #1e293b; --slate-900: #0f172a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--slate-50); color: var(--slate-800); min-height: 100vh; }

        .topbar { position: sticky; top: 0; z-index: 20; background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--slate-200); }
        .topbar-inner { max-width: 1120px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
        .topbar-left { display: flex; align-items: center; gap: 14px; }
        .back-btn { width: 36px; height: 36px; border: 1px solid var(--slate-200); border-radius: 10px; background: white; font-size: 18px; cursor: pointer; }
        .top-title strong { font-size: 18px; }
        .top-title span { font-size: 12px; color: var(--slate-500); display: block; }
        .search-input { width: 260px; padding: 10px 12px; border: 1px solid var(--slate-200); border-radius: 10px; font-size: 13px; background: white; }
        .search-input:focus { outline: none; border-color: var(--green-500); box-shadow: 0 0 0 3px rgba(34,197,94,0.12); }

        .layout { max-width: 1120px; margin: 0 auto; padding: 20px 24px 32px; display: grid; grid-template-columns: 220px 1fr; gap: 20px; align-items: start; }
        .category-panel { background: white; border: 1px solid var(--slate-200); border-radius: 14px; overflow: hidden; }
        .category-header { padding: 16px 18px 12px; border-bottom: 1px solid var(--slate-200); font-weight: 700; font-size: 14px; }
        .category-list { display: flex; flex-direction: column; }
        .category-item { border: none; background: none; padding: 14px 18px; text-align: left; font-size: 13px; cursor: pointer; color: var(--slate-600); transition: background 0.15s, color 0.15s; }
        .category-item:hover { background: var(--slate-100); }
        .category-item.active { background: var(--green-50); color: var(--green-700); font-weight: 600; }

        .main-panel { display: flex; flex-direction: column; gap: 18px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; }
        .section-title { font-size: 18px; font-weight: 700; }
        .section-sub { font-size: 12px; color: var(--slate-500); }
        .template-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 18px; }
        .template-card { background: white; border: 1px solid var(--slate-200); border-radius: 14px; overflow: hidden; transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s; }
        .template-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(15,23,42,0.08); border-color: var(--green-200); }

        .poster-preview { position: relative; padding: 18px; background: linear-gradient(180deg, #fff, var(--slate-50)); border-bottom: 1px solid var(--slate-200); }
        .poster-mock { width: 100%; height: 210px; border-radius: 12px; border: 1px solid var(--slate-200); background: white; padding: 18px; display: flex; flex-direction: column; justify-content: space-between; }
        .poster-mock .mock-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .poster-mock .mock-badge { padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; background: var(--green-50); color: var(--green-700); border: 1px solid var(--green-200); }
        .poster-mock .mock-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--green-50); border: 1px solid var(--green-200); display: flex; align-items: center; justify-content: center; }
        .poster-mock h4 { margin-top: 12px; font-size: 16px; line-height: 1.3; }
        .poster-mock p { font-size: 12px; color: var(--slate-500); margin-top: 8px; }
        .poster-mock .mock-cta { display: inline-flex; align-self: flex-start; margin-top: 10px; padding: 8px 12px; border-radius: 10px; font-size: 12px; font-weight: 700; color: white; background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .poster-mock .mock-footer { border-top: 1px dashed var(--slate-200); margin-top: 10px; padding-top: 8px; display: flex; justify-content: space-between; font-size: 11px; color: var(--slate-500); }

        .card-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 12px; }
        .card-title { font-size: 16px; font-weight: 700; }
        .card-desc { font-size: 12px; line-height: 1.6; color: var(--slate-500); min-height: 38px; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag { font-size: 11px; padding: 6px 10px; border-radius: 999px; border: 1px solid var(--slate-200); color: var(--slate-600); }
        .card-actions { display: flex; gap: 10px; margin-top: 2px; }

        .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
        .btn:hover { transform: translateY(-1px); }
        .btn-outline { background: white; border: 1px solid var(--slate-200); color: var(--slate-800); }
        .btn-outline:hover { box-shadow: 0 12px 30px rgba(15,23,42,0.08); }
        .btn-primary { color: white; background: linear-gradient(135deg, #43e97b, #38f9d7); }
        .btn-primary:hover { box-shadow: 0 10px 24px rgba(67,233,123,0.25); }

        /* 抽屉 */
        .drawer-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.32); opacity: 0; visibility: hidden; transition: opacity 0.2s, visibility 0.2s; z-index: 30; }
        .drawer-overlay.active { opacity: 1; visibility: visible; }
        .drawer { position: fixed; top: 0; right: 0; width: min(960px, calc(100vw - 80px)); height: 100vh; background: white; box-shadow: 0 20px 46px rgba(15,23,42,0.12); transform: translateX(100%); transition: transform 0.24s ease; z-index: 40; display: flex; flex-direction: column; }
        .drawer.active { transform: translateX(0); }
        .drawer-header { padding: 16px 22px; border-bottom: 1px solid var(--slate-200); display: flex; justify-content: space-between; align-items: center; }
        .drawer-title { font-size: 16px; font-weight: 700; }
        .drawer-sub { font-size: 12px; color: var(--slate-500); }
        .drawer-close { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--slate-200); background: white; font-size: 18px; cursor: pointer; }
        .drawer-body { display: grid; grid-template-columns: 340px 1fr; flex: 1; min-height: 0; }
        .drawer-preview { border-right: 1px solid var(--slate-200); background: var(--slate-50); padding: 22px; overflow: auto; }
        .preview-card { background: white; border: 1px solid var(--slate-200); border-radius: 14px; padding: 18px; }
        .preview-label { font-size: 12px; color: var(--slate-500); margin-bottom: 10px; }
        .poster-full { width: 100%; min-height: 380px; border-radius: 12px; border: 1px solid var(--slate-200); background: white; display: flex; flex-direction: column; padding: 22px; gap: 14px; }
        .poster-full h3 { font-size: 22px; line-height: 1.3; }
        .poster-full p { font-size: 13px; color: var(--slate-500); line-height: 1.6; }
        .poster-full .full-cta { margin-top: auto; padding: 12px 16px; border-radius: 10px; color: white; font-weight: 700; background: linear-gradient(135deg, #43e97b, #38f9d7); align-self: flex-start; }
        .drawer-edit { display: flex; flex-direction: column; min-height: 0; }
        .edit-scroll { flex: 1; overflow: auto; padding: 22px; display: flex; flex-direction: column; gap: 16px; }
        .edit-section { border: 1px solid var(--slate-200); border-radius: 14px; background: white; padding: 18px; }
        .edit-section-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; }
        .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
        .form-group.full { grid-column: 1 / -1; }
        .label { display: block; font-size: 12px; color: var(--slate-500); margin-bottom: 6px; }
        .input, .textarea { width: 100%; padding: 10px 12px; border: 1px solid var(--slate-200); border-radius: 10px; font-size: 13px; background: white; }
        .textarea { min-height: 96px; resize: vertical; }
        .input:focus, .textarea:focus { outline: none; border-color: var(--green-500); box-shadow: 0 0 0 3px rgba(34,197,94,0.12); }
        .drawer-footer { border-top: 1px solid var(--slate-200); padding: 14px 22px; display: flex; justify-content: flex-end; gap: 12px; background: white; }
        .btn-lg { padding: 12px 18px; }

        /* 全屏 */
        .fs-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); opacity: 0; visibility: hidden; transition: opacity 0.2s, visibility 0.2s; z-index: 50; }
        .fs-overlay.active { opacity: 1; visibility: visible; }
        .fs-modal { position: fixed; inset: 18px; background: white; border-radius: 18px; transform: translateY(10px) scale(0.99); opacity: 0; visibility: hidden; transition: opacity 0.2s, transform 0.2s, visibility 0.2s; z-index: 60; display: flex; flex-direction: column; overflow: hidden; }
        .fs-modal.active { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
        .fs-header { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--slate-200); }
        .fs-body { flex: 1; overflow: auto; background: var(--slate-50); padding: 24px; display: flex; justify-content: center; }
        .fs-poster { width: min(960px, 100%); min-height: 520px; background: white; border: 1px solid var(--slate-200); border-radius: 16px; padding: 28px; display: flex; flex-direction: column; gap: 16px; }
        .fs-poster h2 { font-size: 26px; }
        .fs-poster p { font-size: 14px; color: var(--slate-500); line-height: 1.6; }
        .fs-poster .fs-cta { margin-top: auto; padding: 14px 18px; border-radius: 12px; background: linear-gradient(135deg, #43e97b, #38f9d7); color: white; font-weight: 700; align-self: flex-start; }
        .empty-state { border: 1px dashed var(--slate-200); border-radius: 14px; padding: 40px; text-align: center; color: var(--slate-500); background: white; }

        /* 成功提示 */
        .success-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); display: none; align-items: center; justify-content: center; z-index: 100; }
        .success-overlay.active { display: flex; }
        .success-box { background: white; border-radius: 16px; padding: 40px 48px; text-align: center; max-width: 360px; }
        .success-box .icon { font-size: 48px; margin-bottom: 16px; }
        .success-box h3 { font-size: 18px; margin-bottom: 8px; }
        .success-box p { font-size: 13px; color: var(--slate-500); margin-bottom: 20px; }

        @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } .template-grid { grid-template-columns: repeat(2, minmax(0,1fr)); } .drawer-body { grid-template-columns: 1fr; } .drawer-preview { border-right: none; border-bottom: 1px solid var(--slate-200); } }
        @media (max-width: 640px) { .template-grid { grid-template-columns: 1fr; } .search-input { width: 100%; } }
    </style>
</head>

                    <button class="btn btn-primary btn-lg" id="applyTemplateBtn">使用此模板</button>

            </div>
        </div>
    </section>

    <div class="fs-overlay" id="fsOverlay"></div>
    <section class="fs-modal" id="fsModal" aria-hidden="true">
        <div class="fs-header">

        <div class="fs-body">

                    { key: 'highlights', label: '内容亮点', type: 'textarea', full: true },
                    { key: 'cta', label: '按钮文案' },
                    { key: 'phone', label: '手机号码' },
                    { key: 'email', label: '邮箱地址' },
                    { key: 'whatsapp', label: 'WhatsApp' },
                ],
                defaults: {
                    name: '张三', role: '健康专家',
                    title: '健康知识精选', subtitle: '聚焦科普内容和常见误区。',
                    highlights: '每周更新健康科普视频\n免费领取营养手册', cta: '获取更多资料',
                    phone: '+60 12-345-6789', email: 'example@email.com', whatsapp: '+60 12-345-6789',
                },
            },
            {
                id: 'activity-webinar', category: 'activity', name: '活动邀约', poster: '线上讲座',
                desc: '适合活动报名、直播邀约或课程招募', badge: '活动报名',
                fields: [
                    { key: 'name', label: '姓名/昵称' },
                    { key: 'role', label: '身份标签' },
                    { key: 'title', label: '活动标题', type: 'textarea', full: true },
                    { key: 'subtitle', label: '活动简介', type: 'textarea', full: true },
                    { key: 'eventTime', label: '活动时间' },
                    { key: 'eventLocation', label: '活动地点/链接' },
                    { key: 'cta', label: '按钮文案' },
                    { key: 'phone', label: '手机号码' },
                    { key: 'whatsapp', label: 'WhatsApp' },
                ],
                defaults: {
                    name: '张三', role: '活动负责人',
                    title: '线上健康讲座邀你参加', subtitle: '适合线上课程、直播分享等报名场景。',
                    eventTime: '本周六 20:00', eventLocation: 'Zoom 线上会议室',
                    cta: '立即报名', phone: '+60 12-345-6789', whatsapp: '+60 12-345-6789',
                },
            },
            {
                id: 'activity-offline', category: 'activity', name: '活动邀约', poster: '线下体验',
                desc: '适合门店体验、沙龙邀约或线下活动宣传', badge: '线下体验',
                fields: [
                    { key: 'name', label: '姓名/昵称' },
                    { key: 'role', label: '身份标签' },
                    { key: 'title', label: '活动标题', type: 'textarea', full: true },
                    { key: 'subtitle', label: '活动简介', type: 'textarea', full: true },
                    { key: 'eventTime', label: '活动时间' },
                    { key: 'eventLocation', label: '活动地点' },
                    { key: 'cta', label: '按钮文案' },
                    { key: 'phone', label: '手机号码' },
                    { key: 'whatsapp', label: 'WhatsApp' },
                ],
                defaults: {
                    name: '张三', role: '活动负责人',
                    title: '线下健康体验活动报名中', subtitle: '适合沙龙、门店体验等线下聚会。',
                    eventTime: '下周日 14:00', eventLocation: '吉隆坡旗舰店',
                    cta: '预约参加', phone: '+60 12-345-6789', whatsapp: '+60 12-345-6789',
                },
            },
        ];

        var activeCategory = 'all';
        var activeTemplate = null;
        var formState = {};

        function renderCategories() {
            var el = document.getElementById('categoryList');
            el.innerHTML = '';
            categories.forEach(function(c) {
                var btn = document.createElement('button');
                btn.className = 'category-item' + (activeCategory === c.id ? ' active' : '');
                btn.textContent = c.name;
                btn.onclick = function() { activeCategory = c.id; renderCategories(); renderTemplates(); };
                el.appendChild(btn);
            });
        }

        function getFiltered() {
            var kw = document.getElementById('searchInput').value.trim().toLowerCase();
            return templates.filter(function(t) {
                var matchCat = activeCategory === 'all' || t.category === activeCategory;
                var haystack = (t.name + t.poster + t.desc).toLowerCase();
                return matchCat && (!kw || haystack.indexOf(kw) !== -1);
            });
        }

        function renderTemplates() {
            var list = getFiltered();
            var cat = categories.filter(function(c){ return c.id === activeCategory; })[0];
            document.getElementById('sectionTitle').textContent = activeCategory === 'all' ? '全部模板' : cat.name;
            document.getElementById('sectionSub').textContent = list.length ? '点击"编辑信息"修改文案与联系方式，支持全屏预览' : '没有匹配的模板';

            var grid = document.getElementById('templateGrid');
            grid.innerHTML = '';

            if (!list.length) {
                var d = document.createElement('div');
                d.className = 'empty-state';
                d.textContent = '暂无匹配模板，换个关键词试试';
                grid.appendChild(d);
                return;
            }

            list.forEach(function(tpl) {
                var card = document.createElement('div');
                card.className = 'template-card';
                card.innerHTML =
                    '<div class="poster-preview"><div class="poster-mock">' +
                        '<div class="mock-top"><span class="mock-badge">' + tpl.badge + '</span><div class="mock-avatar">👤</div></div>' +
                        '<div><h4>' + tpl.defaults.title + '</h4><p>' + tpl.defaults.subtitle + '</p></div>' +
                        '<div class="mock-cta">' + tpl.defaults.cta + '</div>' +
                        '<div class="mock-footer"><span>' + tpl.name + ' · ' + tpl.poster + '</span><span>可修改</span></div>' +
                    '</div></div>' +
                    '<div class="card-body">' +
                        '<div class="card-title">' + tpl.name + ' · ' + tpl.poster + '</div>' +
                        '<div class="card-desc">' + tpl.desc + '</div>' +
                        '<div class="tags"><span class="tag">' + tpl.badge + '</span><span class="tag">可修改文字</span><span class="tag">全屏预览</span></div>' +
                        '<div class="card-actions"><button class="btn btn-outline">编辑信息</button><button class="btn btn-primary">使用模板</button></div>' +
                    '</div>';
                var btns = card.querySelectorAll('.card-actions .btn');
                btns[0].onclick = function() { openDrawer(tpl); };
                btns[1].onclick = function() { applyDirect(tpl); };
                grid.appendChild(card);
            });
        }

        function openDrawer(tpl) {
            activeTemplate = tpl;
            formState = JSON.parse(JSON.stringify(tpl.defaults));
            document.getElementById('drawerTitle').textContent = tpl.name + ' · ' + tpl.poster;
            document.getElementById('drawerSub').textContent = '修改后左侧预览实时更新';
            buildForm(tpl);
            updatePreview();
            toggleDrawer(true);
        }

        function buildForm(tpl) {
            var scroll = document.getElementById('editScroll');
            scroll.innerHTML = '';

            // 页面主信息区
            var infoKeys = tpl.fields.filter(function(f){ return !['phone','email','whatsapp'].includes(f.key); });
            var contactKeys = tpl.fields.filter(function(f){ return ['phone','email','whatsapp'].includes(f.key); });

            if (infoKeys.length) scroll.appendChild(makeSection('页面主信息', infoKeys));
            if (contactKeys.length) scroll.appendChild(makeSection('联系方式', contactKeys));
        }

        function makeSection(title, fields) {
            var sec = document.createElement('div');
            sec.className = 'edit-section';
            var t = document.createElement('div');
            t.className = 'edit-section-title';
            t.textContent = title;
            sec.appendChild(t);

            var grid = document.createElement('div');
            grid.className = 'form-grid';

            fields.forEach(function(f) {
                var g = document.createElement('div');
                g.className = 'form-group' + (f.full ? ' full' : '');

                var lb = document.createElement('label');
                lb.className = 'label';
                lb.textContent = f.label;
                g.appendChild(lb);

                var el;
                if (f.type === 'textarea') {
                    el = document.createElement('textarea');
                    el.className = 'textarea';
                    el.rows = 3;
                } else {
                    el = document.createElement('input');
                    el.className = 'input';
                    el.type = 'text';
                }
                el.value = formState[f.key] || '';
                el.oninput = function() { formState[f.key] = this.value; updatePreview(); };
                g.appendChild(el);
                grid.appendChild(g);
            });

            sec.appendChild(grid);
            return sec;
        }

        function updatePreview() {
            var pp = document.getElementById('posterPreview');
            pp.innerHTML =
                '<span class="mock-badge" style="align-self:flex-start">' + (activeTemplate ? activeTemplate.badge : '') + '</span>' +
                '<h3>' + esc(formState.title) + '</h3>' +
                '<p>' + esc(formState.subtitle) + '</p>' +
                (formState.body ? '<p>' + esc(formState.body) + '</p>' : '') +
                (formState.services ? '<p style="margin-top:6px;font-size:12px;color:#475569">服务：' + esc(formState.services) + '</p>' : '') +
                (formState.faq ? '<p style="margin-top:6px;font-size:12px;color:#475569;white-space:pre-line">' + esc(formState.faq) + '</p>' : '') +
                (formState.credentials ? '<p style="margin-top:6px;font-size:12px;color:#475569;white-space:pre-line">' + esc(formState.credentials) + '</p>' : '') +
                (formState.highlights ? '<p style="margin-top:6px;font-size:12px;color:#475569;white-space:pre-line">' + esc(formState.highlights) + '</p>' : '') +
                (formState.eventTime ? '<p style="margin-top:6px;font-size:12px;color:#475569">⏰ ' + esc(formState.eventTime) + '</p>' : '') +
                (formState.eventLocation ? '<p style="font-size:12px;color:#475569">📍 ' + esc(formState.eventLocation) + '</p>' : '') +
                '<div class="full-cta">' + esc(formState.cta) + '</div>' +
                '<div class="mock-footer" style="margin-top:auto"><span>' + esc(formState.name) + ' · ' + esc(formState.role) + '</span><span>' + esc(formState.phone) + '</span></div>';
        }

        function openFullscreen() {
            if (!activeTemplate) return;
            document.getElementById('fsTitle').textContent = activeTemplate.name + ' · ' + activeTemplate.poster + ' 全屏预览';
            document.getElementById('fsSub').textContent = '当前编辑内容的完整海报效果';

            var extra = '';
            if (formState.services) extra += '<p>服务范围：' + esc(formState.services) + '</p>';
            if (formState.faq) extra += '<p style="white-space:pre-line">' + esc(formState.faq) + '</p>';
            if (formState.credentials) extra += '<p style="white-space:pre-line">' + esc(formState.credentials) + '</p>';
            if (formState.highlights) extra += '<p style="white-space:pre-line">' + esc(formState.highlights) + '</p>';
            if (formState.eventTime) extra += '<p>⏰ ' + esc(formState.eventTime) + '</p>';
            if (formState.eventLocation) extra += '<p>📍 ' + esc(formState.eventLocation) + '</p>';

            document.getElementById('fsPoster').innerHTML =
                '<div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap"><span class="mock-badge">' + activeTemplate.badge + '</span><span style="font-size:12px;color:#64748b">' + esc(formState.role) + '</span></div>' +
                '<h2>' + esc(formState.title) + '</h2>' +
                '<p>' + esc(formState.subtitle) + '</p>' +
                (formState.body ? '<p>' + esc(formState.body) + '</p>' : '') +
                extra +
                '<div style="display:flex;flex-wrap:wrap;gap:10px;font-size:12px;color:#475569;margin-top:8px">' +
                    '<span>📱 ' + esc(formState.phone) + '</span>' +
                    '<span>✉️ ' + esc(formState.email) + '</span>' +
                    '<span>💬 WhatsApp: ' + esc(formState.whatsapp) + '</span>' +
                '</div>' +
                '<div class="fs-cta">' + esc(formState.cta) + '</div>' +
                '<div style="margin-top:auto;font-size:12px;color:#64748b">联系顾问：' + esc(formState.name) + '</div>';
            toggleFS(true);
        }

        function sendToBuilder(tpl, data) {
            var payload = {
                name: tpl.name, poster: tpl.poster, desc: tpl.desc,
                id: tpl.id, category: tpl.category,
                fields: tpl.fields,
                defaults: data
            };
            // 方法1: 直接调用 opener 函数
            try {
                if (window.opener && typeof window.opener.applySelectedTemplateFromLibrary === 'function') {
                    window.opener.applySelectedTemplateFromLibrary(payload);
                    return true;
                }
            } catch(e) {}
            // 方法2: postMessage 兜底
            try {
                if (window.opener) {
                    window.opener.postMessage({ type: 'landing-template-selected', template: payload }, '*');
                    return true;
                }
            } catch(e) {}
            return false;
        }

        function applyDirect(tpl) {
            sendToBuilder(tpl, tpl.defaults);
            showSuccess();
        }

        function applyFromDrawer() {
            if (!activeTemplate) return;
            sendToBuilder(activeTemplate, formState);
            showSuccess();
        }

        function showSuccess() {
            document.getElementById('successOverlay').classList.add('active');
        }

        function toggleDrawer(on) {
            document.getElementById('drawer').classList.toggle('active', on);
            document.getElementById('drawerOverlay').classList.toggle('active', on);
        }
        function toggleFS(on) {
            document.getElementById('fsModal').classList.toggle('active', on);
            document.getElementById('fsOverlay').classList.toggle('active', on);
        }
        function esc(s) { return String(s||'').replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c]; }); }

        document.getElementById('drawerClose').onclick = function() { toggleDrawer(false); };
        document.getElementById('closeDrawerBtn').onclick = function() { toggleDrawer(false); };
        document.getElementById('drawerOverlay').onclick = function() { toggleDrawer(false); };
        document.getElementById('previewFullscreenBtn').onclick = openFullscreen;
        document.getElementById('applyTemplateBtn').onclick = applyFromDrawer;
        document.getElementById('fsClose').onclick = function() { toggleFS(false); };
        document.getElementById('fsOverlay').onclick = function() { toggleFS(false); };
        document.getElementById('searchInput').oninput = renderTemplates;

        renderCategories();
        renderTemplates();
    </script>
</body>
</html>
