<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>elken app重构版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px 20px 50px;
            position: relative;
        }
        
        .header-top {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .back-arrow {
            color: white;
            font-size: 20px;
            margin-right: 15px;
        }
        
        .header-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }
        
        .avatar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .edit-icon {
            position: absolute;
            top: 60px;
            right: 50%;
            transform: translateX(30px);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #007aff;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        
        .user-name {
            color: white;
            font-size: 16px;
            font-weight: 500;
        }
        
        .info-container {
            background-color: white;
            border-radius: 20px 20px 0 0;
            margin-top: -20px;
            padding: 20px;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-label {
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #666;
        }
        
        .info-icon {
            margin-right: 10px;
            font-size: 16px;
        }
        
        .info-value {
            font-size: 14px;
            color: #333;
            display: flex;
            align-items: center;
        }
        
        .arrow-icon {
            margin-left: 10px;
            font-size: 12px;
            color: #999;
        }
        
        /* 非模态提示框样式 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div class="back-arrow" onclick="window.location.href='profile_page1.html'">←</div>
            <div class="header-title">资料</div>
        </div>
        
        <div class="avatar-container">
            <div class="avatar" id="avatar">张</div>
            <div class="edit-icon" onclick="document.getElementById('avatar-upload').click()">✏️</div>
            <div class="user-name">张</div>
            <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
        </div>
    </div>
    
    <div class="info-container">
        <div class="info-item">
            <div class="info-label">
                <span class="info-icon">📞</span>
                联系电话
            </div>
            <div class="info-value">
                +60192291708
                <span class="arrow-icon">›</span>
            </div>
        </div>
        
        <div class="info-item">
            <div class="info-label">
                <span class="info-icon">👤</span>
                姓名
            </div>
            <div class="info-value">
                张
                <span class="arrow-icon">›</span>
            </div>
        </div>
        
        <div class="info-item">
            <div class="info-label">
                <span class="info-icon">📧</span>
                邮箱
            </div>
            <div class="info-value">
                sharifahnurulhusna19@gmail.com
                <span class="arrow-icon">›</span>
            </div>
        </div>
        
        <div class="info-item" onclick="window.location.href='profile_page3.html'">
            <div class="info-label">
                <span class="info-icon">⚙️</span>
                设置
            </div>
            <div class="info-value">
                <span class="arrow-icon">›</span>
            </div>
        </div>
    </div>
    
    <!-- 非模态提示框 -->
    <div class="toast" id="toast"></div>
    
    <script>
        // 显示非模态提示框
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        // 替换所有alert为showToast
        window.alert = function(message) {
            showToast(message);
        };
        
        // 头像上传和裁剪功能
        document.getElementById('avatar-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const avatar = document.getElementById('avatar');
                    // 创建一个新的img元素来显示上传的图片
                    const img = document.createElement('img');
                    img.src = event.target.result;
                    img.style.width = '100%';
                    img.style.height = '100%';
                    img.style.objectFit = 'cover';
                    img.style.borderRadius = '50%';
                    // 清空原有内容并添加新图片
                    avatar.innerHTML = '';
                    avatar.appendChild(img);
                    // 保存头像到本地存储
                    localStorage.setItem('avatar', event.target.result);
                    // 显示上传成功提示
                    showToast('头像上传成功');
                };
                reader.readAsDataURL(file);
            }
        });
        
        // 页面加载时从本地存储加载头像
        window.addEventListener('load', function() {
            const savedAvatar = localStorage.getItem('avatar');
            if (savedAvatar) {
                const avatar = document.getElementById('avatar');
                const img = document.createElement('img');
                img.src = savedAvatar;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'cover';
                img.style.borderRadius = '50%';
                avatar.innerHTML = '';
                avatar.appendChild(img);
            }
        });
    </script>
</body>
</html>
