<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 图文生成 - Elken App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            padding-bottom: 70px;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: white;
        }
        
        .header-top {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .header-left {
            display: flex;
            align-items: center;
        }
        
        .back-btn {
            font-size: 24px;
            margin-right: 15px;
            cursor: pointer;
        }
        
        .header-title {
            font-size: 20px;
            font-weight: 600;
        }
        
        .quota-bar {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }
        
        .quota-item {
            text-align: center;
        }
        
        .quota-number {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 2px;
        }
        
        .content {
            padding: 20px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
        }
        
        .date-badge {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
        }
        
        .calendar-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #667eea;
            color: white;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .calendar-btn:hover {
            background: #5568d3;
        }
        
        .calendar-icon {
            font-size: 14px;
        }
        
        /* 日历弹窗 */
        .calendar-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: flex-end;
        }
        
        .calendar-modal.active {
            display: flex;
        }
        
        .calendar-content {
            background: white;
            width: 100%;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .calendar-month {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .calendar-nav {
            font-size: 20px;
            cursor: pointer;
            color: #667eea;
        }
        
        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 10px;
        }
        
        .calendar-day-name {
            text-align: center;
            font-size: 12px;
            color: #999;
            padding: 8px 0;
        }
        
        .calendar-dates {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        
        .calendar-date {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .calendar-date:hover {
            background: #f0f0f0;
        }
        
        .calendar-date.selected {
            background: #667eea;
            color: white;
        }
        
        .calendar-date.has-content {
            position: relative;
        }
        
        .calendar-date.has-content::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            background: #10b981;
            border-radius: 50%;
        }
        
        .calendar-date.disabled {
            color: #ccc;
            cursor: not-allowed;
        }
        
        .calendar-footer {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            gap: 10px;
        }
        
        .calendar-btn-cancel {
            flex: 1;
            padding: 12px;
            background: #f5f5f5;
            color: #666;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .content-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }

        .loading-spinner {
            position: relative;
            width: 56px;
            height: 56px;
            margin-bottom: 24px;
        }

        .loading-spinner::before,
        .loading-spinner::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid transparent;
        }

        .loading-spinner::before {
            border-top-color: #667eea;
            border-right-color: #667eea;
            animation: spin-ring 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .loading-spinner::after {
            border-bottom-color: #a78bfa;
            border-left-color: #a78bfa;
            animation: spin-ring 1s cubic-bezier(0.4, 0, 0.2, 1) infinite reverse;
            inset: 6px;
        }

        .loading-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 8px;
            height: 8px;
            margin: -4px 0 0 -4px;
            background: #667eea;
            border-radius: 50%;
            animation: pulse-dot 1s ease-in-out infinite;
        }

        @keyframes spin-ring {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(0.6); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .loading-text {
            font-size: 14px;
            color: #667eea;
            font-weight: 500;
            letter-spacing: 0.5px;
            animation: fade-text 1.5s ease-in-out infinite;
        }

        @keyframes fade-text {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .loading-skeletons {
            width: 100%;
            max-width: 100%;
        }

        .modal-loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1200;
        }

        .modal-loading-overlay.active {
            display: flex;
        }

        .modal-loading-card {
            background: white;
            border-radius: 20px;
            padding: 36px 44px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.18);
        }

        .modal-loading-title {
            font-size: 15px;
            font-weight: 600;
            color: #111827;
            margin-top: 20px;
        }

        .modal-loading-sub {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 6px;
            animation: fade-text 1.5s ease-in-out infinite;
        }

        .skeleton-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }

        .skeleton-image {
            width: 100%;
            height: 180px;
            background: linear-gradient(110deg, #eee 30%, #f5f5f5 50%, #eee 70%);
            background-size: 200% 100%;
            animation: shimmer 1.8s ease-in-out infinite;
        }

        .skeleton-body {
            padding: 16px;
        }

        .skeleton-line {
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(110deg, #eee 30%, #f5f5f5 50%, #eee 70%);
            background-size: 200% 100%;
            animation: shimmer 1.8s ease-in-out infinite;
            margin-bottom: 10px;
        }

        .skeleton-line:last-child {
            margin-bottom: 0;
        }

        .skeleton-line.w80 { width: 80%; }
        .skeleton-line.w60 { width: 60%; animation-delay: 0.15s; }
        .skeleton-line.w40 { width: 40%; animation-delay: 0.3s; }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .content-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            position: relative;
        }
        
        .content-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-overlay {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
        }
        
        .content-body {
            padding: 15px;
        }
        
        .content-date {
            font-size: 11px;
            color: #999;
            margin-bottom: 8px;
        }
        
        .content-text {
            font-size: 14px;
            line-height: 1.6;
            color: #333;
            margin-bottom: 15px;
        }
        
        .content-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            flex: 1;
            min-width: 80px;
            padding: 8px 12px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: all 0.2s;
        }
        
        .action-btn:hover {
            background: #f5f5f5;
        }
        
        .action-btn.primary {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .action-btn.primary:hover {
            background: #5568d3;
        }
        
        .action-btn.share {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .action-btn.share:hover {
            background: #5568d3;
        }

        .share-sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            display: none;
            align-items: flex-end;
            z-index: 1100;
        }

        .share-sheet-overlay.active {
            display: flex;
        }

        .share-sheet {
            width: 100%;
            background: #fff;
            border-radius: 22px 22px 0 0;
            padding: 18px 20px 28px;
            box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.14);
        }

        .share-sheet-handle {
            width: 44px;
            height: 5px;
            border-radius: 999px;
            background: #d1d5db;
            margin: 0 auto 16px;
        }

        .share-sheet-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        .share-sheet-title {
            font-size: 16px;
            font-weight: 600;
            color: #111827;
        }

        .share-sheet-close {
            border: none;
            background: #f3f4f6;
            color: #6b7280;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
        }

        .share-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 12px;
        }

        .share-option {
            border: none;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #374151;
            font-size: 12px;
        }

        .share-option-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 15px;
            font-weight: 700;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
        }

        .share-option-icon.whatsapp {
            background: #25d366;
        }

        .share-option-icon.facebook {
            background: #1877f2;
            font-family: Arial, sans-serif;
        }

        .share-option-icon.instagram {
            background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc274d 50%, #cc2366 75%, #bc1888 100%);
        }

        .share-option-icon.rednote {
            background: #ff2442;
            font-size: 12px;
            line-height: 1.1;
            text-align: center;
            padding: 6px;
        }

        .share-option-icon.copy {
            background: #4b5563;
        }
        
        .image-to-text-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }
        
        .itt-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .itt-desc {
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .upload-text {
            font-size: 13px;
            color: #999;
        }
        
        /* 编辑模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-title {
            font-size: 16px;
            font-weight: 600;
        }
        
        .modal-close {
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .modal-body {
            padding: 20px;
        }
        
        .edit-image {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .edit-textarea {
            width: 100%;
            min-height: 120px;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            font-family: inherit;
        }
        
        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .modal-btn.cancel {
            background: #f5f5f5;
            color: #666;
        }
        
        .modal-btn.confirm {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div class="back-btn" onclick="window.location.href='marketing_assistant.html'">←</div>
            <div class="header-title">AI 图文生成</div>
        </div>
        <div class="quota-bar">
            <div class="quota-item">
                <div class="quota-number">15/20</div>
                <div>今日发送额度</div>
            </div>
            <div class="quota-item">
                <div class="quota-number">8/10</div>
                <div>图生文次数</div>
            </div>
        </div>
    </div>
    
    <div class="content">
        <div class="section-header">
            <div class="section-title">每日推荐</div>
            <div class="calendar-btn" onclick="showCalendar()">
                <span class="calendar-icon">📅</span>
                <span id="selectedDate">2026-06-08</span>
            </div>
        </div>
        
        <div id="contentsContainer"></div>
        
        <!-- 图生文功能 -->
        <div class="image-to-text-section">
            <div class="itt-title">
                <span>🖼️</span>
                <span>图生文功能</span>
            </div>
            <div class="itt-desc">上传图片，AI自动生成营销文案（今日剩余：8/10次）</div>
            <div class="upload-area" onclick="document.getElementById('imageInput').click()">
                <div class="upload-icon">📤</div>
                <div class="upload-text">点击上传图片或拖拽图片到此处</div>
            </div>
            <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="handleImageUpload(this)">
        </div>
    </div>
    
    <!-- 编辑模态框 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">编辑图文内容</div>
                <div class="modal-close" onclick="closeEditModal()">×</div>
            </div>
            <div class="modal-body">
                <img class="edit-image" id="editImage" src="" alt="编辑图片">
                <textarea class="edit-textarea" id="editText" placeholder="请输入文案内容..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="modal-btn cancel" onclick="closeEditModal()">取消</button>
                <button class="modal-btn confirm" onclick="saveEdit()">保存</button>
            </div>
        </div>
    </div>

    <div class="modal-loading-overlay" id="modalLoading">
        <div class="modal-loading-card">
            <div class="loading-spinner">
                <div class="loading-dot"></div>
            </div>
            <div class="modal-loading-title">AI 正在生成文案</div>
            <div class="modal-loading-sub">分析图片中，请稍候...</div>
        </div>
    </div>

    <div class="share-sheet-overlay" id="shareSheet" onclick="handleShareSheetOverlay(event)">
        <div class="share-sheet">
            <div class="share-sheet-handle"></div>
            <div class="share-sheet-header">
                <div class="share-sheet-title">分享到</div>
                <button class="share-sheet-close" onclick="closeShareSheet()">×</button>
            </div>
            <div class="share-grid">
                <button class="share-option" onclick="shareCurrentContent('whatsapp')">
                    <div class="share-option-icon whatsapp">WA</div>
                    <span>WhatsApp</span>
                </button>
                <button class="share-option" onclick="shareCurrentContent('facebook')">
                    <div class="share-option-icon facebook">f</div>
                    <span>Facebook</span>
                </button>
                <button class="share-option" onclick="shareCurrentContent('instagram')">
                    <div class="share-option-icon instagram">IG</div>
                    <span>Instagram</span>
                </button>
                <button class="share-option" onclick="shareCurrentContent('rednote')">
                    <div class="share-option-icon rednote">RED<br>note</div>
                    <span>国际版小红书</span>
                </button>
                <button class="share-option" onclick="shareCurrentContent('copy')">
                    <div class="share-option-icon copy">⧉</div>
                    <span>复制链接</span>
                </button>
            </div>
        </div>
    </div>
    
    <!-- 日历弹窗 -->
    <div class="calendar-modal" id="calendarModal">
        <div class="calendar-content">
            <div class="calendar-header">
                <div class="calendar-nav" onclick="prevMonth()">←</div>
                <div class="calendar-month" id="calendarMonth">2024年1月</div>
                <div class="calendar-nav" onclick="nextMonth()">→</div>
            </div>
            <div class="calendar-days">
                <div class="calendar-day-name">日</div>
                <div class="calendar-day-name">一</div>
                <div class="calendar-day-name">二</div>
                <div class="calendar-day-name">三</div>
                <div class="calendar-day-name">四</div>
                <div class="calendar-day-name">五</div>
                <div class="calendar-day-name">六</div>
            </div>
            <div class="calendar-dates" id="calendarDates"></div>
            <div class="calendar-footer">
                <button class="calendar-btn-cancel" onclick="closeCalendar()">取消</button>
            </div>
        </div>
    </div>
    
    <script>
        // 内容数据 - 按日期分组
        const festivalImages = {
            raya: 'src/image/kzj.jpg',
            national: 'src/image/ScreenShot_2026-06-09_161742_532.png',

        function getImageByType(type) {

                    overlay: '📅 2024-01-15 | 🎉 新年特惠',

                    posterSubtitle: '维生素补充剂 + 新年限时优惠',
                    promoTag: '限时特惠'
                },
                {
                    image: 'src/image/ScreenShot_2026-06-09_161742_532.png',

        }
        
        // 保存编辑
        function saveEdit() {
            const newText = document.getElementById('editText').value;
            const contents = getCurrentContents();
            contents[currentEditIndex].text = newText;
            
            renderContents();
            closeEditModal();
            alert('内容已保存！');
        }
        
        // 复制文字
        function copyText(index) {
            const contents = getCurrentContents();
            const text = contents[index].text;
            navigator.clipboard.writeText(text).then(() => {
                alert('文案已复制到剪贴板！');
            }).catch(() => {
                alert('复制失败，请手动复制');
            });
        }
        
        function openShareSheet(index) {
            currentShareIndex = index;
            document.getElementById('shareSheet').classList.add('active');
        }

        function closeShareSheet() {
            document.getElementById('shareSheet').classList.remove('active');
        }

        function handleShareSheetOverlay(event) {
            if (event.target.id === 'shareSheet') {
                closeShareSheet();
            }
        }

        function getSharePayload(index) {
            const contents = getCurrentContents();
            const content = contents[index];
            const shareUrl = `https://elken.app/content-share?date=${encodeURIComponent(currentDate)}&item=${index + 1}`;
            const shareText = `${content.text}\n\n${shareUrl}`;

            return { content, shareUrl, shareText };
        }

        // 分享到平台
        function shareTo(platform, index) {
            if (sendQuota <= 0) {
                alert('今日发送额度已用完，请明天再试！');
                return;
            }

            const { shareUrl, shareText } = getSharePayload(index);
            
            switch(platform) {
                case 'whatsapp':
                    window.open(`https://wa.me/?text=${encodeURIComponent(shareText)}`, '_blank');
                    sendQuota--;
                    updateQuotaDisplay();
                    break;
                case 'facebook':
                    window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`, '_blank');
                    sendQuota--;
                    updateQuotaDisplay();
                    break;
                case 'instagram':
                    window.open(`https://www.instagram.com/`, '_blank');
                    sendQuota--;
                    updateQuotaDisplay();
                    break;
                case 'rednote':
                    window.open(`https://www.xiaohongshu.com/explore`, '_blank');
                    sendQuota--;
                    updateQuotaDisplay();
                    break;
                case 'copy':
                    navigator.clipboard.writeText(shareUrl).then(() => {
                        alert('分享链接已复制到剪贴板！');
                    }).catch(() => {
                        alert('复制失败，请手动复制链接');
                    });
                    sendQuota--;
                    updateQuotaDisplay();
                    break;
            }
        }

        function shareCurrentContent(platform) {
            if (currentShareIndex === null) {
                return;
            }

            shareTo(platform, currentShareIndex);
            closeShareSheet();
        }
        
        // 处理图片上传
        function handleImageUpload(input) {
            if (imageToTextQuota <= 0) {
                alert('图生文次数已用完，请明天再试！');
                return;
            }
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imageToTextQuota--;
                    updateQuotaDisplay();

                    document.getElementById('modalLoading').classList.add('active');

                    setTimeout(() => {
                        const generatedText = '这款产品蕴含天然精华，为您带来健康活力。科学配方，品质保证，让每一天都充满能量！';

                        if (!contentsByDate[currentDate]) {
                            contentsByDate[currentDate] = [];
                        }

                        contentsByDate[currentDate].push({
                            image: e.target.result,
                            text: generatedText,
                            overlay: '🖼️ 图生文生成',
                            date: new Date().toLocaleDateString('zh-CN')
                        });

                        document.getElementById('modalLoading').classList.remove('active');
                        renderContents();

                        input.value = '';
                    }, 2000);
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        
        // 日历功能
        let currentCalendarYear = 2026;
        let currentCalendarMonth = 5;
        
        // 获取有内容的日期
        function getDatesWithContent() {
            return Object.keys(contentsByDate);
        }
        
        // 渲染日历
        function renderCalendar() {
            const datesWithContent = getDatesWithContent();
            const firstDay = new Date(currentCalendarYear, currentCalendarMonth, 1);
            const lastDay = new Date(currentCalendarYear, currentCalendarMonth + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startDay = firstDay.getDay();
            
            // 获取今天日期
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            // 更新月份显示
            document.getElementById('calendarMonth').textContent = `${currentCalendarYear}年${currentCalendarMonth + 1}月`;
            
            // 生成日期格子
            let html = '';
            
            // 空白日期
            for (let i = 0; i < startDay; i++) {
                html += '<div class="calendar-date disabled"></div>';
            }
            
            // 有效日期
            for (let i = 1; i <= daysInMonth; i++) {
                const dateStr = `${currentCalendarYear}-${String(currentCalendarMonth + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const dateObj = new Date(currentCalendarYear, currentCalendarMonth, i);
                const hasContent = datesWithContent.includes(dateStr);
                const isSelected = dateStr === currentDate;
                const isFuture = dateObj > today;
                
                html += `
                    <div class="calendar-date ${hasContent ? 'has-content' : ''} ${isSelected ? 'selected' : ''} ${isFuture ? 'disabled future' : ''}" onclick="${isFuture ? '' : `selectCalendarDate('${dateStr}')`}">
                        ${i}
                    </div>
                `;
            }
            
            document.getElementById('calendarDates').innerHTML = html;
        }
        
        // 显示日历
        function showCalendar() {
            document.getElementById('calendarModal').classList.add('active');
            renderCalendar();
        }
        
        // 关闭日历
        function closeCalendar() {
            document.getElementById('calendarModal').classList.remove('active');
        }
        
        // 选择日期
        function selectCalendarDate(date) {
            currentDate = date;
            document.getElementById('selectedDate').textContent = currentDate;
            closeCalendar();
            showLoading();
            setTimeout(() => {
                hideLoading();
                renderContents();
            }, 2000);
        }

        function showLoading() {
            const container = document.getElementById('contentsContainer');
            container.innerHTML = `
                <div class="loading-container">
                    <div class="loading-spinner">
                        <div class="loading-dot"></div>
                    </div>
                    <div class="loading-text">正在加载推荐内容...</div>
                </div>
                <div class="loading-skeletons">
                    <div class="skeleton-card">
                        <div class="skeleton-image"></div>
                        <div class="skeleton-body">
                            <div class="skeleton-line w80"></div>
                            <div class="skeleton-line w60"></div>
                            <div class="skeleton-line w40"></div>
                        </div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton-image"></div>
                        <div class="skeleton-body">
                            <div class="skeleton-line w80"></div>
                            <div class="skeleton-line w60"></div>
                            <div class="skeleton-line w40"></div>
                        </div>
                    </div>
                </div>
            `;
        }

        function hideLoading() {
            document.getElementById('contentsContainer').innerHTML = '';
        }
        
        // 上一个月
        function prevMonth() {
            if (currentCalendarMonth === 0) {
                currentCalendarMonth = 11;
                currentCalendarYear--;
            } else {
                currentCalendarMonth--;
            }
            renderCalendar();
        }
        
        // 下一个月
        function nextMonth() {
            if (currentCalendarMonth === 11) {
                currentCalendarMonth = 0;
                currentCalendarYear++;
            } else {
                currentCalendarMonth++;
            }
            renderCalendar();
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateQuotaDisplay();
            renderContents();
        });
    </script>
</body>
</html>
